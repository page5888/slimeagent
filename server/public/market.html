<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Slime 社群市場</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0a0e1a;
      --bg-1: #0f1524;
      --bg-2: #141b2e;
      --bg-3: #1a2238;
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.12);
      --border-accent: rgba(201,169,97,0.4);
      --text: #e8eaf0;
      --text-muted: #8b92a7;
      --text-dim: #5a6278;
      --accent: #c9a961;
      --accent-bright: #e8d4a2;
      --accent-dim: #8a7542;
      --accent-glow: rgba(201,169,97,0.18);
      --accent-bg: rgba(201,169,97,0.06);
      --danger: #e55b6d;
      --success: #5fb878;
      --warning: #e5a94e;
      --font-sans: "Inter","PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
      --font-mono: "JetBrains Mono","SF Mono",Monaco,Consolas,monospace;
      --r-sm: 8px; --r-md: 14px; --r-lg: 20px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-0);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 800px 600px at 15% 0%, rgba(201,169,97,0.08), transparent 60%),
                  radial-gradient(ellipse 600px 400px at 85% 100%, rgba(100,140,200,0.04), transparent 50%);
      pointer-events: none; z-index: 0;
    }

    /* Nav */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,14,26,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-brand .logo-icon { font-size: 24px; }
    .nav-brand .logo-text { color: var(--accent); font-weight: 700; font-size: 18px; }
    .nav-links { display: flex; gap: 8px; list-style: none; }
    .nav-links a, .nav-links button {
      color: var(--text-muted); text-decoration: none; padding: 6px 14px;
      border-radius: var(--r-sm); font-size: 14px; transition: all 0.2s;
      background: none; border: none; cursor: pointer; font-family: inherit;
    }
    .nav-links a:hover, .nav-links button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .nav-links a.active { color: var(--accent); background: var(--accent-bg); }
    .nav-user { color: var(--accent); font-size: 13px; font-weight: 500; }

    /* Container */
    .container { max-width: 960px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }

    /* Hero */
    .hero {
      text-align: center; padding: 48px 0 32px;
    }
    .hero h1 { font-size: 28px; font-weight: 700; }
    .hero h1 span { color: var(--accent); }
    .hero p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      padding: 10px 20px; background: none; border: none; color: var(--text-muted);
      font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Filters */
    .filters {
      display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
    }
    .filters select {
      background: var(--bg-2); color: var(--text); border: 1px solid var(--border-strong);
      border-radius: var(--r-sm); padding: 8px 12px; font-family: inherit; font-size: 13px;
    }
    .filters select:focus { outline: none; border-color: var(--accent); }
    .btn {
      padding: 8px 18px; border-radius: var(--r-sm); font-family: inherit;
      font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
    }
    .btn-accent { background: var(--accent); color: #000; }
    .btn-accent:hover { background: var(--accent-bright); }
    .btn-ghost { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border-strong); }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
    .btn-success { background: var(--success); color: #000; }
    .btn-success:hover { opacity: 0.9; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* Cards */
    .card-grid { display: flex; flex-direction: column; gap: 12px; }
    .card {
      background: linear-gradient(135deg, rgba(255,255,255,0.035), rgba(255,255,255,0.015));
      border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 16px 20px;
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      transition: all 0.2s;
    }
    .card:hover { border-color: var(--border-accent); transform: translateY(-1px); }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 600; font-size: 15px; }
    .card-meta { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
    .card-buff { color: var(--success); font-size: 12px; margin-top: 2px; }
    .card-action { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 100px; }
    .card-price { font-family: var(--font-mono); font-weight: 600; color: var(--accent); font-size: 16px; }

    /* Vote progress */
    .vote-bar-wrap { width: 100px; height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
    .vote-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
    .vote-count { font-family: var(--font-mono); font-size: 13px; color: var(--accent); font-weight: 600; }
    .voted-badge { color: var(--success); font-size: 12px; font-weight: 500; }

    /* Rarity colors */
    .rarity-common { color: #aaa; }
    .rarity-uncommon { color: #5fb878; }
    .rarity-rare { color: #4da8da; }
    .rarity-epic { color: #a855f7; }
    .rarity-legendary { color: #e5a94e; }
    .rarity-mythic { color: #e55b6d; }
    .rarity-ultimate { color: #ffd700; }

    /* Pagination */
    .pagination {
      display: flex; justify-content: center; align-items: center; gap: 12px;
      margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    .pagination span { color: var(--text-muted); font-size: 13px; }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* Status bar */
    .status-bar {
      text-align: center; padding: 8px; color: var(--text-dim); font-size: 12px;
      border-top: 1px solid var(--border); margin-top: 24px;
    }

    /* Auth banner */
    .auth-banner {
      background: var(--accent-bg); border: 1px solid var(--border-accent);
      border-radius: var(--r-md); padding: 16px 20px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .auth-banner p { color: var(--text-muted); font-size: 13px; }

    /* Slot badges */
    .slot-badge {
      display: inline-block; padding: 2px 8px; border-radius: var(--r-sm);
      background: rgba(255,255,255,0.05); color: var(--text-muted);
      font-size: 11px; font-weight: 500;
    }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: var(--text-dim); }

    /* Responsive */
    @media (max-width: 600px) {
      .card { flex-direction: column; align-items: flex-start; }
      .card-action { flex-direction: row; width: 100%; justify-content: space-between; }
      .filters { flex-direction: column; }
      .nav { padding: 10px 16px; }
      .nav-links { gap: 2px; }
      .nav-links a, .nav-links button { padding: 6px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <!-- Nav -->
  <nav class="nav">
    <a href="/market" class="nav-brand">
      <span class="logo-icon">🫠</span>
      <span class="logo-text">AI Slime 市場</span>
    </a>
    <div style="display:flex; align-items:center; gap:16px;">
      <ul class="nav-links">
        <li><a href="https://wallet-5888.web.app" target="_blank">5888 錢包</a></li>
      </ul>
      <span id="user-info" class="nav-user"></span>
    </div>
  </nav>

  <div class="container">
    <!-- Hero -->
    <div class="hero">
      <h1>🫠 <span>AI Slime</span> 社群市場</h1>
      <p>投票決定遊戲內容 · 交易你的裝備 · 共同建造生態</p>
    </div>

    <!-- Auth banner (shown when not logged in) -->
    <div id="auth-banner" class="auth-banner" style="display:none;">
      <p>登入後即可投票和交易（投票每次 10 點）</p>
      <button class="btn btn-accent" onclick="doLogin()">Google 登入</button>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="vote" onclick="switchTab('vote')">🗳 社群投票</button>
      <button class="tab-btn" data-tab="trade" onclick="switchTab('trade')">💰 裝備交易</button>
    </div>

    <!-- Vote Panel -->
    <div id="panel-vote">
      <div class="filters">
        <select id="vote-slot">
          <option value="">全部欄位</option>
          <option value="helmet">頭盔</option>
          <option value="eyes">眼睛</option>
          <option value="mouth">嘴巴</option>
          <option value="skin">皮膚</option>
          <option value="background">背景</option>
          <option value="core">晶核</option>
          <option value="left_hand">左手</option>
          <option value="right_hand">右手</option>
          <option value="mount">載具</option>
          <option value="vfx">特效</option>
          <option value="drone">精靈</option>
          <option value="title">稱號</option>
        </select>
        <button class="btn btn-ghost" onclick="loadSubmissions()">重新整理</button>
      </div>
      <div id="vote-list" class="card-grid">
        <div class="loading">載入中...</div>
      </div>
      <div id="vote-pagination" class="pagination" style="display:none;">
        <button class="btn btn-ghost btn-sm" id="vote-prev" onclick="votePage(-1)">← 上一頁</button>
        <span id="vote-page-info">第 1 頁</span>
        <button class="btn btn-ghost btn-sm" id="vote-next" onclick="votePage(1)">下一頁 →</button>
      </div>
    </div>

    <!-- Trade Panel -->
    <div id="panel-trade" style="display:none;">
      <div class="filters">
        <select id="trade-slot">
          <option value="">全部欄位</option>
          <option value="helmet">頭盔</option>
          <option value="eyes">眼睛</option>
          <option value="mouth">嘴巴</option>
          <option value="skin">皮膚</option>
          <option value="background">背景</option>
          <option value="core">晶核</option>
          <option value="left_hand">左手</option>
          <option value="right_hand">右手</option>
          <option value="mount">載具</option>
          <option value="vfx">特效</option>
          <option value="drone">精靈</option>
          <option value="title">稱號</option>
        </select>
        <select id="trade-rarity">
          <option value="">全部稀有度</option>
          <option value="common">普通</option>
          <option value="uncommon">優良</option>
          <option value="rare">稀有</option>
          <option value="epic">史詩</option>
          <option value="legendary">傳說</option>
          <option value="mythic">神話</option>
          <option value="ultimate">究極</option>
        </select>
        <button class="btn btn-ghost" onclick="loadListings()">重新整理</button>
      </div>
      <div id="trade-list" class="card-grid">
        <div class="loading">載入中...</div>
      </div>
      <div id="trade-pagination" class="pagination" style="display:none;">
        <button class="btn btn-ghost btn-sm" id="trade-prev" onclick="tradePage(-1)">← 上一頁</button>
        <span id="trade-page-info">第 1 頁</span>
        <button class="btn btn-ghost btn-sm" id="trade-next" onclick="tradePage(1)">下一頁 →</button>
      </div>
    </div>

    <div class="status-bar" id="status-bar"></div>
  </div>

<script>
// ── Config ──────────────────────────────────────────────────────────
const API = location.origin;  // Relay server serves both API and this page
let authToken = localStorage.getItem('slime_token') || '';
let currentUser = null;
let voteCurrentPage = 1;
let tradeCurrentPage = 1;

const SLOT_ZH = {
  helmet:'頭盔', eyes:'眼睛', mouth:'嘴巴', left_hand:'左手',
  right_hand:'右手', skin:'皮膚', background:'背景', core:'晶核',
  mount:'載具', vfx:'特效', drone:'精靈', title:'稱號'
};

// ── API Helper ──────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (authToken) opts.headers['Authorization'] = 'Bearer ' + authToken;
  if (body) opts.body = JSON.stringify(body);

  const resp = await fetch(API + '/' + path, opts);
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || err.message || 'Request failed');
  }
  return resp.json();
}

// ── Auth ────────────────────────────────────────────────────────────
function updateAuthUI() {
  const banner = document.getElementById('auth-banner');
  const info = document.getElementById('user-info');
  if (authToken) {
    banner.style.display = 'none';
    info.textContent = currentUser ? currentUser.display_name || currentUser.email : '已登入';
  } else {
    banner.style.display = 'flex';
    info.textContent = '';
  }
}

async function doLogin() {
  // In production, this would use Firebase Auth popup → get Google id_token → POST /auth/login
  // For now, show instructions
  alert('登入功能需要透過 AI Slime 桌面版或 5888 錢包進行 Google 登入。\n\n已有帳號的用戶可在桌面版取得 token。');
}

// Check saved auth on load
if (authToken) {
  api('GET', 'auth/me').then(user => {
    currentUser = user;
    updateAuthUI();
  }).catch(() => {
    authToken = '';
    localStorage.removeItem('slime_token');
    updateAuthUI();
  });
} else {
  updateAuthUI();
}

// ── Tabs ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel-vote').style.display = tab === 'vote' ? 'block' : 'none';
  document.getElementById('panel-trade').style.display = tab === 'trade' ? 'block' : 'none';

  if (tab === 'vote') loadSubmissions();
  else loadListings();
}

// ── Vote ────────────────────────────────────────────────────────────
async function loadSubmissions() {
  const list = document.getElementById('vote-list');
  list.innerHTML = '<div class="loading">載入中...</div>';

  const slot = document.getElementById('vote-slot').value;
  let url = `equipment/submissions?status=pending&page=${voteCurrentPage}`;
  if (slot) url += `&slot=${slot}`;

  try {
    const data = await api('GET', url);
    renderSubmissions(data.items || [], data.total || 0);
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">無法連線：${e.message}</div></div>`;
  }
}

function renderSubmissions(items, total) {
  const list = document.getElementById('vote-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🗳</div><div class="empty-text">目前沒有待投票的作品</div></div>';
    document.getElementById('vote-pagination').style.display = 'none';
    return;
  }

  list.innerHTML = items.map(item => {
    const rarity = item.rarity || 'common';
    const pct = Math.min(100, (item.vote_count / item.vote_threshold) * 100);
    const buffHtml = item.buff
      ? `<div class="card-buff">Buff: ${Object.entries(item.buff).map(([k,v]) => `${k} +${v}`).join(' | ')}</div>`
      : '';
    const actionHtml = item.user_voted
      ? '<span class="voted-badge">✓ 已投票</span>'
      : `<button class="btn btn-accent btn-sm" onclick="doVote('${item.id}')">投票 (10pt)</button>`;

    return `
      <div class="card">
        <div class="card-info">
          <div class="card-name">
            <span class="rarity-${rarity}">[${rarity}]</span> ${item.name}
          </div>
          <div class="card-meta">
            <span class="slot-badge">${SLOT_ZH[item.slot] || item.slot}</span>
            · 創作者: ${item.creator_name || '?'}
            ${item.description ? ' · ' + item.description : ''}
          </div>
          ${buffHtml}
        </div>
        <div class="card-action">
          <span class="vote-count">${item.vote_count}/${item.vote_threshold}</span>
          <div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%"></div></div>
          ${actionHtml}
        </div>
      </div>`;
  }).join('');

  // Pagination
  const totalPages = Math.max(1, Math.ceil(total / 20));
  const pg = document.getElementById('vote-pagination');
  pg.style.display = 'flex';
  document.getElementById('vote-page-info').textContent = `第 ${voteCurrentPage} / ${totalPages} 頁`;
  document.getElementById('vote-prev').disabled = voteCurrentPage <= 1;
  document.getElementById('vote-next').disabled = voteCurrentPage >= totalPages;

  document.getElementById('status-bar').textContent = `投票區：共 ${total} 件作品`;
}

function votePage(delta) {
  voteCurrentPage = Math.max(1, voteCurrentPage + delta);
  loadSubmissions();
}

async function doVote(submissionId) {
  if (!authToken) { doLogin(); return; }
  try {
    const r = await api('POST', `equipment/submissions/${submissionId}/vote`);
    let msg = `投票成功！(${r.vote_count}/${r.vote_threshold})`;
    if (r.approved) msg += '\n🎉 這個作品已通過投票，加入裝備池了！';
    alert(msg);
    loadSubmissions();
  } catch (e) {
    alert('投票失敗：' + e.message);
  }
}

// ── Trade ───────────────────────────────────────────────────────────
async function loadListings() {
  const list = document.getElementById('trade-list');
  list.innerHTML = '<div class="loading">載入中...</div>';

  const slot = document.getElementById('trade-slot').value;
  const rarity = document.getElementById('trade-rarity').value;
  let url = `marketplace/listings?page=${tradeCurrentPage}`;
  if (slot) url += `&slot=${slot}`;
  if (rarity) url += `&rarity=${rarity}`;

  try {
    const data = await api('GET', url);
    renderListings(data.items || [], data.total || 0);
  } catch (e) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📡</div><div class="empty-text">無法連線：${e.message}</div></div>`;
  }
}

function renderListings(items, total) {
  const list = document.getElementById('trade-list');
  if (!items.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">💰</div><div class="empty-text">目前市場上沒有商品</div></div>';
    document.getElementById('trade-pagination').style.display = 'none';
    return;
  }

  list.innerHTML = items.map(item => {
    const rarity = item.rarity || 'common';
    return `
      <div class="card">
        <div class="card-info">
          <div class="card-name">
            <span class="rarity-${rarity}">[${rarity}]</span> ${item.template_name}
          </div>
          <div class="card-meta">
            <span class="slot-badge">${SLOT_ZH[item.slot] || item.slot}</span>
            · 賣家: ${item.seller_name || '?'}
          </div>
        </div>
        <div class="card-action">
          <span class="card-price">${Number(item.price).toLocaleString()} 點</span>
          <button class="btn btn-success btn-sm" onclick="doBuy('${item.id}', '${item.template_name}', ${item.price})">購買</button>
        </div>
      </div>`;
  }).join('');

  const totalPages = Math.max(1, Math.ceil(total / 20));
  const pg = document.getElementById('trade-pagination');
  pg.style.display = 'flex';
  document.getElementById('trade-page-info').textContent = `第 ${tradeCurrentPage} / ${totalPages} 頁`;
  document.getElementById('trade-prev').disabled = tradeCurrentPage <= 1;
  document.getElementById('trade-next').disabled = tradeCurrentPage >= totalPages;

  document.getElementById('status-bar').textContent = `市場：共 ${total} 件上架`;
}

function tradePage(delta) {
  tradeCurrentPage = Math.max(1, tradeCurrentPage + delta);
  loadListings();
}

async function doBuy(listingId, name, price) {
  if (!authToken) { doLogin(); return; }
  if (!confirm(`確定要購買「${name}」嗎？\n花費 ${price.toLocaleString()} 點`)) return;
  try {
    const r = await api('POST', 'marketplace/buy', { listing_id: listingId });
    alert(`購買成功！\n${r.item_name}\n花費 ${r.price.toLocaleString()} 點（手續費 ${r.fee} 點）`);
    loadListings();
  } catch (e) {
    alert('購買失敗：' + e.message);
  }
}

// ── Init ────────────────────────────────────────────────────────────
loadSubmissions();
</script>
</body>
</html>
