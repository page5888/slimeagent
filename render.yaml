services:
  - type: web
    name: slimeagent-relay
    runtime: python
    plan: free
    buildCommand: pip install -r server/requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: slimeagent-db
          property: connectionString
      - key: RELAY_JWT_SECRET
        generateValue: true
      - key: RELAY_DEBUG
        value: "0"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: PYTHONPATH
        value: /opt/render/project/src

databases:
  - name: slimeagent-db
    plan: free
    databaseName: slimeagent
